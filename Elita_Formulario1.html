<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Cadastro de Aluno</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Cadastro de Aluno</h1>

    <form>

        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" required>
        <br><br>

        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" required>
        <br><br>

        <label for="cpf">CPF:</label>
        <input type="text" id="cpf" name="cpf" pattern="[0-9]{11}" inputmode="numeric" aria-describedby="cpf-dica"
            required>

        <small id="cpf-dica">
            Digite apenas números (11 dígitos)
        </small>

        <br><br>

        <label for="data">Data de nascimento:</label>
        <input type="date" id="data" name="data">
        <br><br>

        <label for="curso">Curso:</label>
        <select id="curso" name="curso">
            <option value="">Selecione</option>
            <option value="ads">ADS</option>
            <option value="si">Sistemas de Informação</option>
            <option value="cc">Ciência da Computação</option>
        </select>

        <br><br>

        <fieldset>
            <legend>Turno</legend>

            <input type="radio" id="manha" name="turno" value="manha">
            <label for="manha">Manhã</label>

            <input type="radio" id="tarde" name="turno" value="tarde">
            <label for="tarde">Tarde</label>

            <input type="radio" id="noite" name="turno" value="noite">
            <label for="noite">Noite</label>

        </fieldset>

        <br>

        <input type="checkbox" id="termos" name="termos" required>
        <label for="termos">Aceito os termos</label>

        <br><br>

        <button type="submit">Enviar</button>
        <button type="reset">Limpar</button>

    </form>

</body>

</html>
